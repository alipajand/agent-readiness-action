name: Agent Readiness Audit
description: Audit repository readiness for AI coding agents using agent-readiness-kit
author: Ali Pajand

branding:
  icon: check-circle
  color: blue

inputs:
  repo-path:
    description: >
      Path to the repository or subdirectory to audit. Relative paths are
      resolved from the GitHub Actions workspace root (GITHUB_WORKSPACE).
    default: '.'
    required: false
  min-score:
    description: >
      Minimum acceptable agent-readiness score, from 0 to 100. Used when
      fail-on-threshold is true.
    default: '0'
    required: false
  output:
    description: >
      Write a Markdown report to this path. Relative paths are resolved under
      repo-path; absolute paths are written as given. Leave empty to skip the
      report.
    default: ''
    required: false
  json:
    description: Echo the raw JSON audit output to the Actions log.
    default: 'false'
    required: false
  comment-on-pr:
    description: >
      Post or update a summary comment on the pull request. Only runs on
      pull_request events. Requires the GITHUB_TOKEN environment variable set
      with pull-requests: write permission.
    default: 'false'
    required: false
  fail-on-threshold:
    description: Fail the workflow step when the score is below min-score.
    default: 'true'
    required: false

outputs:
  score:
    description: Final agent-readiness score, from 0 to 100.
  report-path:
    description: >
      Path to the written Markdown report, or empty when the output input was
      not set.

runs:
  using: node20
  main: dist/index.js
